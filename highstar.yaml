name: promptbeat-lite
one_liner: Run local-first prompt and agent regression checks.
target_user: Prompt engineers and AI agent builders
pain_point: Prompt and agent changes need cheap regression checks before full eval suites.
demo_command: PYTHONPATH=src python3 -m promptbeat_lite examples/suite --format junit --fail-under 100
tier: flagship
maturity_status: trend-aligned-2026-05-31
next_release: v0.2.1
polish_score: 93
topics:
  - ai-tools
  - prompt-engineering
  - evals
  - testing
  - cli
  - llmops
  - llm-evaluation
release_channel:
  - github
  - relevant-developer-communities
launch_copy:
  - I built promptbeat-lite for local-first prompt and agent regression checks.
  - It runs JSON fixture files or suite folders with golden files, JUnit output, and CI thresholds.
  - Try it with: PYTHONPATH=src python3 -m promptbeat_lite examples/suite --format junit --fail-under 100
quality_gate:
  commands:
    - python3 -m unittest discover -s tests
metrics_goal:
  day_1_stars: 5
  day_3_stars: 15
  day_7_stars: 50
